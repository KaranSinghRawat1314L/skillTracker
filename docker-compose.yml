version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: skilltracker-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build: ./backend
    container_name: skilltracker-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/skilltracker
      FRONTEND_URL: http://localhost
    depends_on:
      - mongo
    ports:
      - '5000:5000'

  frontend:
    build: ./frontend
    container_name: skilltracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  mongo_data:
